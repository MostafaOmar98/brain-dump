baseURL: "https://mostafakhalil.eu/"

title: Mostafa Khalil
paginate: 100
theme: PaperMod

enableRobotsTXT: true
buildDrafts: false
buildFuture: false
buildExpired: false

minify:
  disableXML: true
  minifyOutput: true

services:
  googleAnalytics:
    ID: "G-BE0YDNK1KG"

params:
  env: production
  title: Mostafa Khalil
  description: "Mostafa Khalil's personal Blog"
  keywords: [Blog, Portfolio, PaperMod]
  images: [] # TODO: get a pic
  DateFormat: "January 2, 2006"
  defaultTheme: auto
  disableThemeToggle: false

  ShowReadingTime: true
  ShowShareButtons: true
  ShowPostNavLinks: false
  ShowBreadCrumbs: true
  ShowCodeCopyButtons: true
  ShowWordCount: true
  ShowRssButtonInSectionTermList: true
  UseHugoToc: true
  disableSpecial1stPost: true
  disableScrollToTop: false
  comments: false
  hidemeta: false
  hideSummary: true
  showtoc: false
  tocopen: false

  # home-info mode
  homeInfoParams:
    Content: >
     Hi, I'm Mostafa. I'm a software engineer, currently at Google working on internal observability tools.


     I'm most experienced with distributed systems, performance & reliability engineering, and software delivery. My writing will largely revolve around that.  


     I'm also a math and [competitive programming](https://codeforces.com/profile/bekh) enthusiast, though I've faced skill atrophy in recent years; my focus skewed
     towards system-level problems rather than algorithimic puzzles. I have been recently reading about foundational math, probability, and machine learning to combat that. I like learning things from their first principles, so you might find me writing about that as well.

  assets:
    # disableHLJS: true # to disable highlight.js
    # disableFingerprinting: true
    favicon: "<link / abs url>"
    favicon16x16: "<link / abs url>"
    favicon32x32: "<link / abs url>"
    apple_touch_icon: "<link / abs url>"
    safari_pinned_tab: "<link / abs url>"

  label:
    text: "Mostafa Khalil"
    icon: /apple-touch-icon.png
    iconHeight: 35

  # profile-mode
  profileMode:
    enabled: false # needs to be explicitly set
    title: ExampleSite
    subtitle: "This is subtitle"
    imageUrl: "<img location>"
    imageWidth: 120
    imageHeight: 120
    imageTitle: my image
    buttons:
      - name: Posts
        url: posts
      - name: Tags
        url: tags

  socialIcons:
    - name: linkedin
      url: "https://www.linkedin.com/in/mostafaomar98/"
    - name: email
      url: "mailto:mostafa.omar.m.s@gmail.com"

  analytics:
    google:
      SiteVerificationTag: "XYZabc"
    bing:
      SiteVerificationTag: "XYZabc"
    yandex:
      SiteVerificationTag: "XYZabc"

  cover:
    hidden: true # hide everywhere but not in structured data
    hiddenInList: true # hide on list pages and home
    hiddenInSingle: true # hide on single page

  # I ain't wanna let people edit my posts
  # editPost:
  #   URL: "https://github.com/MostafaOmar98/brain-dump/mostafakhalil/content"
  #   Text: "Let me know what you think" # edit text
  #   appendFilePath: true # to append file path to Edit link

  # for search
  # https://fusejs.io/api/options.html
  fuseOpts:
    isCaseSensitive: false
    shouldSort: true
    location: 0
    distance: 1000
    threshold: 0.4y
    minMatchCharLength: 0
    limit: 10 # refer: https://www.fusejs.io/api/methods.html#search
    keys: ["title", "permalink", "summary", "content"]
menu:
  main:
#     - identifier: categories
#       name: categories
#       url: /categories/
#       weight: 10
    - identifier: tags
      name: tags
      url: /tags/
      weight: 20
    # - identifier: example
    #   name: example.org
    #   url: https://example.org
    #   weight: 30
# Read: https://github.com/adityatelange/hugo-PaperMod/wiki/FAQs#using-hugos-syntax-highlighter-chroma
pygmentsUseClasses: true
markup:
  highlight:
    noClasses: false
    # anchorLineNos: true
    # codeFences: true
    # guessSyntax: true
    # lineNos: true
    # style: monokai
  # For latex math:
  goldmark:
    extensions:
      passthrough:
        enable: true
        delimiters:
          block:
            - ['$$', '$$']
            - ['\[', '\]']
          inline:
            - ['$', '$']
            - ['\(', '\)']
  